services:
  openclaw-gateway:
    image: ghcr.io/${GHCR_USERNAME}/openclaw-docker-config/openclaw-gateway:latest
    env_file: .env
    restart: unless-stopped
    environment:
      HOME: /home/node
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      NODE_ENV: production
      TERM: xterm-256color
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCLAW_CORS_ORIGIN: ${OPENCLAW_CORS_ORIGIN:-https://openclaw.local}
      TELEGRAM_ADMIN_1: ${TELEGRAM_ADMIN_1:-}
      TELEGRAM_ADMIN_2: ${TELEGRAM_ADMIN_2:-}
      TELEGRAM_ADMIN_3: ${TELEGRAM_ADMIN_3:-}
      TELEGRAM_GROUP_1: ${TELEGRAM_GROUP_1:-}
      TELEGRAM_GROUP_2: ${TELEGRAM_GROUP_2:-}
      WHATSAPP_ADMIN_1: ${WHATSAPP_ADMIN_1}
      WHATSAPP_ADMIN_2: ${WHATSAPP_ADMIN_2}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GH_TOKEN: ${GH_TOKEN:-}
      # gogcli: keep both OAuth config and file-keyring state on the mounted
      # OpenClaw volume so auth survives container replacement during deploys.
      XDG_CONFIG_HOME: /home/node/.openclaw/.config
      XDG_DATA_HOME: /home/node/.openclaw/.local/share
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-openclaw-gog-keyring}
      GH_CONFIG_DIR: /home/node/.openclaw/gh
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/openclaw/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/openclaw/.openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "127.0.0.1:18789:18789"
    command: openclaw gateway --bind lan --port 18789

  workspace-sync:
    image: ghcr.io/${GHCR_USERNAME}/openclaw-docker-config/workspace-sync:latest
    restart: unless-stopped
    environment:
      GIT_WORKSPACE_REPO: ${GIT_WORKSPACE_REPO:-}
      GIT_WORKSPACE_REMOTE: ${GIT_WORKSPACE_REMOTE:-}
      GIT_WORKSPACE_BRANCH: ${GIT_WORKSPACE_BRANCH:-auto}
      GIT_WORKSPACE_TOKEN: ${GIT_WORKSPACE_TOKEN:-}
      GIT_WORKSPACE_SYNC_SCHEDULE: ${GIT_WORKSPACE_SYNC_SCHEDULE:-0 4 * * *}
    volumes:
      - ${OPENCLAW_WORKSPACE_DIR:-/home/openclaw/.openclaw/workspace}:/workspace
    profiles:
      - sync

  # For multi-agent setups, duplicate the workspace-sync service for each agent.
  # The volume subdirectory must match the agent's workspace path in openclaw.json
  # (e.g. "workspace": "~/.openclaw/workspace/second" → mount /second).
  #
  # workspace-sync-second:
  #   image: ghcr.io/${GHCR_USERNAME}/openclaw-docker-config/workspace-sync:latest
  #   restart: unless-stopped
  #   environment:
  #     GIT_WORKSPACE_REPO: ${GIT_WORKSPACE_REPO_SECOND:-}
  #     GIT_WORKSPACE_REMOTE: ${GIT_WORKSPACE_REMOTE_SECOND:-}
  #     GIT_WORKSPACE_BRANCH: ${GIT_WORKSPACE_BRANCH:-auto}
  #     GIT_WORKSPACE_TOKEN: ${GIT_WORKSPACE_TOKEN:-}
  #     GIT_WORKSPACE_SYNC_SCHEDULE: ${GIT_WORKSPACE_SYNC_SCHEDULE:-0 4 * * *}
  #   volumes:
  #     - ${OPENCLAW_WORKSPACE_DIR:-/home/openclaw/.openclaw/workspace}/second:/workspace
  #   profiles:
  #     - sync
